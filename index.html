<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СУШИМАГ Отзыв</title>
  <!-- ❌ УБРАЛ max-web-app.js -->
  <style>/* тот же стиль */</style>
</head>
<body>
  <h2>📝 Отзыв в СУШИМАГ</h2>
  <textarea id="formInput" placeholder="Что понравилось?"></textarea>
  <button onclick="sendForm()">Отправить</button>

  <script>
    // ✅ Fake WebApp без ошибок
    window.WebApp = {
      initDataUnsafe: {user: {id: 999, first_name: 'Браузер'}},
      close: () => alert('Готово!')
    };

    const JETBOT_WEBHOOK = 'https://corsproxy.io/?' + encodeURIComponent('https://api.jetbot24.ru/hook/674464:xTElBBMqfRILA6lmAhn4fPUqFSuYEmTeCGZ2SsaILbyz31JQ');

    async function sendForm() {
      console.log('🚀 ОТПРАВКА!');
      const input = document.getElementById('formInput').value.trim();
      if (!input) return alert('Текст?');

      try {
        const res = await fetch(JETBOT_WEBHOOK, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: input, test: 'browser'})
        });
        console.log('✅', res.status);
        alert('✅ В СУШИМАГ!');
      } catch(e) {
        console.error(e);
        alert('❌ ' + e);
      }
    }
  </script>
</body>
</html>
