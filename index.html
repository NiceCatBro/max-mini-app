<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АО "СУШИМАГ"</title>
  <style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;padding:20px;color:#1f2937;}.container{max-width:400px;margin:0 auto;}.header{text-align:center;margin-bottom:24px;}.title{font-size:32px;font-weight:700;background:linear-gradient(135deg,#f97316 0%,#ea580c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}.subtitle{font-size:16px;color:#6b7280;margin-bottom:32px;}.button{display:block;width:100%;padding:16px 20px;margin-bottom:12px;border:none;border-radius:16px;font-size:16px;font-weight:600;color:white;cursor:pointer;transition:all .2s ease;box-shadow:0 4px 12px rgba(0,0,0,.1);}.button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15);}.btn-secondary{background:linear-gradient(135deg,#10b981 0%,#059669 100%);}.btn-accent{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%);}.btn-info{background:linear-gradient(135deg,#3b82f6 0%,#1d4ed8 100%);}.footer{text-align:center;margin-top:32px;font-size:12px;color:#9ca3af;}</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 class="title">АО "СУШИМАГ"</h1>
    <p class="subtitle">Выберите нужный раздел</p>
  </div>
  <button class="button btn-secondary" onclick="handleAction('topic')">💡 Предложить тему</button>
  <button class="button btn-accent" onclick="handleAction('feedback')">⭐ Оставить отзыв</button>
  <button class="button btn-info" onclick="handleAction('contacts')">📞 Контакты</button>
  <div class="footer">Мини-приложение для MAX</div>
</div>

<script>
  // ✅ ВСТАВЬ СВОЙ JETBOT WEBHOOK URL
  const JETBOT_WEBHOOK = 'https://api.jetbot.ru/webhook/ТВОЙ_WEBHOOK_ID'; // ← ЗАМЕНИ!

  let webApp;
  try {
    webApp = window.Telegram?.WebApp || window.WebApp;
    webApp.ready(); webApp.expand();
  } catch(e){}

  function handleAction(action) {
    switch(action) {
      case 'topic': showForm('Предложить тему', 'Какая тема вас интересует?'); break;
      case 'feedback': showForm('Оставить отзыв', 'Оцените нас и напишите комментарий:'); break;
      case 'contacts': showContacts(); break;
    }
  }

  function showForm(title, placeholder) {
    document.body.insertAdjacentHTML('beforeend', `
      <div class="form-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;">
        <div class="form-card" style="background:white;border-radius:20px;padding:24px;max-width:90%;max-height:80%;overflow:auto;">
          <h3 style="margin-bottom:16px;font-size:20px;">${title}</h3>
          <textarea id="formInput" placeholder="${placeholder}" rows="5" style="width:100%;padding:12px;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;margin-bottom:16px;"></textarea>
          <div>
            <button onclick="sendForm()" class="button btn-secondary" style="width:48%;margin-right:4%;">✅ Отправить</button>
            <button onclick="closeForm()" class="button" style="width:48%;background:#6b7280;">❌ Отмена</button>
          </div>
        </div>
      </div>
    `);
  }

  async function sendForm() {
    const input = document.getElementById('formInput').value.trim();
    if (!input) { alert('❌ Напишите сообщение'); return; }

    try {
      const response = await fetch(JETBOT_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: input,
          type: document.querySelector('.form-card h3')?.textContent || 'Сообщение',
          timestamp: new Date().toLocaleString('ru-RU'),
          source: 'sushimag_miniapp',
          user: webApp?.initDataUnsafe?.user ? `${webApp.initDataUnsafe.user.first_name || ''} ${webApp.initDataUnsafe.user.last_name || ''}` : 'Гость'
        })
      });

      if (response.ok) {
        alert('✅ Отправлено в АО "СУШИМАГ"!');
        if (webApp) webApp.close();
      } else {
        throw new Error('JetBot не отвечает');
      }
    } catch (e) {
      alert('❌ Ошибка: ' + e.message);
    }
    closeForm();
  }

  function closeForm() {
    document.querySelector('.form-overlay')?.remove();
  }

  function showContacts() {
    alert(`
📞 Контакты АО "СУШИМАГ"
Телефон: +7 (903) 193-75-53
Email: support@sushi-m.net
Юридический адрес: 358009, Республика Калмыкия, г.о. Город Элиста, г. Элиста, мкр. 3, д. 4, помещ. 26
    `);
  }
</script>
</body>
</html>
