
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АО "СУШИМАГ"</title>
  <script src="https://st.max.ru/js/max-web-app.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8f9fa; padding: 20px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 28px; color: #e74c3c; margin-bottom: 10px; text-align: center; }
    p { color: #7f8c8d; margin-bottom: 20px; text-align: center; }
    button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; color: white; cursor: pointer; }
    .btn-topic { background: #27ae60; }
    .btn-feedback { background: #f39c12; }
    .btn-contacts { background: #3498db; }
    .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #95a5a6; }
  </style>
</head>
<body>
  <h1>АО "СУШИМАГ"</h1>
  <p>Выберите нужный раздел</p>
  <button class="btn-topic" onclick="handleAction('topic')">💡 Предложить тему</button>
  <button class="btn-feedback" onclick="handleAction('feedback')">⭐ Оставить отзыв</button>
  <button class="btn-contacts" onclick="handleAction('contacts')">📞 Контакты</button>
  <div class="footer">Мини-приложение для MAX</div>

  <script>
    window.WebApp.ready();
    window.WebApp.expand();

    const JETBOT_WEBHOOK = 'https://api.jetbot24.ru/hook/674227:CnpStLX7KdCQHjXoITMql734qKBBSk896SCTLHnD2F0PRZzy';

    function handleAction(action) {
      if (action === 'contacts') {
        alert('📞 АО "СУШИМАГ"\n+7 (903) 193-75-53\nsupport@sushi-m.net\n358009, Элиста, мкр. 3, д. 4, помещ. 26');
      } else {
        const title = action === 'topic' ? 'Предложить тему' : 'Оставить отзыв';
        const placeholder = action === 'topic' ? 'Какая тема вас интересует?' : 'Оцените нас и напишите комментарий:';
        showForm(title, placeholder);
      }
    }

    function showForm(title, placeholder) {
      const form = document.createElement('div');
      form.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;';
      form.innerHTML = \`
        <div style="background:white;border-radius:20px;padding:24px;max-width:90%;max-height:80%;">
          <h3 style="margin-bottom:16px;font-size:20px;">\${title}</h3>
          <textarea id="formInput" placeholder="\${placeholder}" rows="5" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;box-sizing:border-box;"></textarea>
          <div style="margin-top:16px;">
            <button onclick="sendForm()" style="width:48%;margin-right:4%;padding:12px;background:#27ae60;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Отправить</button>
            <button onclick="closeForm()" style="width:48%;padding:12px;background:#95a5a6;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Отмена</button>
          </div>
        </div>
      \`;
      document.body.appendChild(form);
      document.getElementById('formInput').focus();
    }

    async function sendForm() {
      const input = document.getElementById('formInput').value.trim();
      if (!input) return alert('Напишите сообщение');

      try {
        await fetch(JETBOT_WEBHOOK, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            message: input,
            type: document.querySelector('h3')?.textContent || 'Сообщение',
            timestamp: new Date().toLocaleString('ru-RU'),
            source: 'sushimag'
          })
        });
        alert('✅ Отправлено!');
        window.WebApp.close();
      } catch(e) {
        alert('❌ Ошибка отправки');
      }
      closeForm();
    }

    function closeForm() {
      const overlay = document.querySelector('div[style*="position:fixed"]');
      if (overlay) overlay.remove();
    }
  </script>
</body>
</html>
